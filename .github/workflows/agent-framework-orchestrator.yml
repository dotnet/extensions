name: Agent Framework Template Orchestrator

# Orchestration only: resolve the newest coherent Microsoft Agent Framework release on the
# dnceng "dotnet-public" NuGet feed and dispatch the Agent Framework Template Worker for it.
# Deterministic discovery (no agent) via a C# file-based app, so this is a plain workflow. The
# worker is invoked as a reusable workflow (workflow_call) so it runs in this run's context and
# inherits the orchestrator's actor, satisfying the worker's gh-aw activation role check. (A
# GITHUB_TOKEN workflow_dispatch would run as github-actions[bot], which has no repo role and
# fails activation.)

on:
  schedule:
    - cron: "40 9 * * *" # daily, ~09:40 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run: compute and print the target without dispatching the worker."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: agent-framework-orchestrator
  cancel-in-progress: false

jobs:
  discover:
    name: Discover the Agent Framework release
    # Only run on a schedule for the canonical (non-fork) repository; allow manual dispatch
    # anywhere (e.g. for testing in a fork).
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.repository.fork }}
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.discover.outputs.targets }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0.x"
      - name: Discover the newest Agent Framework release from the NuGet feed
        id: discover
        run: |
          set -euo pipefail
          # The C# app writes the JSON array to this file so the "dotnet run"
          # build/restore output on stdout never contaminates the captured value.
          out="${RUNNER_TEMP}/agent-framework-targets.json"
          # ImportDirectoryBuild{Props,Targets}=false isolates this file-based app from the repo's
          # Directory.Build.props (which injects analyzer PackageReferences that break the standalone
          # build). These must be command-line globals -- a #:property lands too late to skip the import.
          dotnet run .github/scripts/agent-framework-discover.cs \
            --property:ImportDirectoryBuildProps=false --property:ImportDirectoryBuildTargets=false \
            -- "$out"
          targets="$(cat "$out")"
          count="$(jq 'length' <<<"$targets")"
          echo "Discovered ${count} target(s):"
          jq '.' <<<"$targets"
          {
            echo "targets<<__EOF__"; jq -c '.' <<<"$targets"; echo "__EOF__"
            echo "count=${count}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Discovered ${count} Agent Framework release target(s)"
            echo '```json'; jq '.' <<<"$targets"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  maintain:
    name: Maintain the aiagent-webapi template
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' && !inputs.dry_run }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # The worker's compiled reusable workflow requests discussions: write on its gh-aw-generated
      # jobs (the compiler grants the union of all safe-output scopes, even ones we don't use). A
      # reusable workflow can't exceed the caller's permissions, so this must be granted here even
      # though we never touch discussions.
      discussions: write
      actions: read
    strategy:
      fail-fast: false
      # The worker shares one concurrency group (cancel-in-progress false), so distinct targets
      # serialize regardless of this value. Dispatch one at a time so a queued target is never
      # dropped by concurrency's pending-run-replacement rule.
      max-parallel: 1
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    # Invoke the worker via workflow_call so it runs in this run's context and inherits the
    # orchestrator's actor, satisfying the worker's gh-aw role check.
    uses: ./.github/workflows/agent-framework-worker.lock.yml
    with:
      target: ${{ toJSON(matrix.target) }}
    secrets: inherit
